services:
  # ─────────────────────────────
  # Backend: FastAPI Web Service
  # ─────────────────────────────
  - type: web
    name: bullstips-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --chdir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

      # API Keys
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false

    healthCheckPath: /

  # ─────────────────────────────
  # Frontend: React (Vite Static)
  # ─────────────────────────────
  - type: web
    name: bullstips-frontend
    env: static
    plan: free

    # FIX: use cd instead of buildCommandContext
    buildCommand: cd Frontend && npm install && npm run build

    # IMPORTANT: path relative to repo root
    staticPublishPath: Frontend/dist

    envVars:
      - key: VITE_FACTCHECK_ENDPOINT
        fromService:
          name: bullstips-backend
          type: web
          property: host
        suffix: /api/factcheck
